name: Build Streamora Native APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/streamora.keystore \
            -alias streamora \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass streamora123 -keypass streamora123 \
            -dname "CN=Streamora, OU=Mobile, O=Streamora, L=NA, ST=NA, C=US"

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign & align release APK
        run: |
          BT=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          IN=app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED=app/build/outputs/apk/release/streamora-aligned.apk
          "$ANDROID_SDK_ROOT/build-tools/$BT/zipalign" -f 4 "$IN" "$ALIGNED"
          "$ANDROID_SDK_ROOT/build-tools/$BT/apksigner" sign \
            --ks app/streamora.keystore --ks-key-alias streamora \
            --ks-pass pass:streamora123 --key-pass pass:streamora123 \
            --out streamora-release.apk "$ALIGNED"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: streamora-native-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: streamora-native-release
          path: streamora-release.apk
          if-no-files-found: warn
